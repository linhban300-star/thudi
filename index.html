<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vẽ Từ Xa - Điện thoại điều khiển máy tính</title>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>
    <!-- pdf-lib -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js">
    </script>
    <!-- Mammoth.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js">
    </script>

    <style>
        /* ----- RESET ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #666;
        }

        /* ----- UPLOAD ----- */
        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
        }
        .upload-area input[type="file"] {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            font-size: 14px;
        }
        .upload-area button {
            padding: 10px 24px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .upload-area button:hover {
            background: #5a4bd1;
        }
        .upload-area .file-name {
            font-size: 14px;
            color: #2d3436;
            background: #ecf0f1;
            padding: 6px 14px;
            border-radius: 20px;
            display: none;
        }
        .upload-area .file-name.show {
            display: inline-block;
        }

        /* ----- KẾT NỐI ----- */
        .connection-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        .connection-panel .room-code {
            font-size: 20px;
            font-weight: 700;
            color: #6c5ce7;
            background: white;
            padding: 4px 16px;
            border-radius: 8px;
            border: 2px dashed #6c5ce7;
            font-family: monospace;
            letter-spacing: 2px;
            min-width: 80px;
            text-align: center;
        }
        .connection-panel .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-badge.disconnected {
            background: #dfe6e9;
            color: #636e72;
        }
        .status-badge.connected {
            background: #00b894;
            color: white;
        }
        .status-badge.waiting {
            background: #fdcb6e;
            color: #2d3436;
        }
        .connection-panel button {
            padding: 6px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .connection-panel .btn-connect {
            background: #0984e3;
            color: white;
        }
        .connection-panel .btn-connect:hover {
            background: #0770c4;
        }
        .connection-panel .btn-disconnect {
            background: #e17055;
            color: white;
        }
        .connection-panel .btn-disconnect:hover {
            background: #c0392b;
        }
        .connection-panel .btn-copy {
            background: #dfe6e9;
            color: #2d3436;
        }
        .connection-panel .btn-copy:hover {
            background: #b2bec3;
        }
        .connection-panel input {
            padding: 6px 12px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 14px;
            width: 120px;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .connection-panel .hint {
            font-size: 13px;
            color: #636e72;
            margin-left: 5px;
        }

        /* ----- PAGE NAV ----- */
        .page-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 10px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #e9ecef;
        }
        .page-nav button {
            padding: 6px 16px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .page-nav button:hover {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }
        .page-nav button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-nav .page-info {
            font-size: 14px;
            font-weight: 600;
            color: #2d3436;
            margin: 0 10px;
        }
        .page-nav .page-actions {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }
        .page-nav .page-actions button {
            background: #dfe6e9;
            border: none;
            font-size: 12px;
        }
        .page-nav .page-actions button:hover {
            background: #6c5ce7;
            color: white;
        }

        /* ----- TOOLBAR ----- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        .toolbar .group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .toolbar .group label {
            font-size: 13px;
            font-weight: 500;
            color: #495057;
        }
        .toolbar button {
            padding: 6px 14px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .toolbar button:hover {
            background: #e9ecef;
        }
        .toolbar button.active {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }
        .toolbar button.save-btn {
            background: #00b894;
            color: white;
            border-color: #00b894;
        }
        .toolbar button.save-btn:hover {
            background: #00a381;
        }
        .toolbar input[type="color"] {
            width: 34px;
            height: 34px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 2px;
            cursor: pointer;
            background: white;
        }
        .toolbar input[type="range"] {
            width: 80px;
            cursor: pointer;
        }
        .toolbar .size-value {
            font-size: 13px;
            font-weight: 600;
            color: #2d3436;
            min-width: 24px;
            text-align: center;
        }

        /* ----- VIEWER ----- */
        .viewer-wrapper {
            position: relative;
            background: #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            min-height: 500px;
            border: 1px solid #dee2e6;
            touch-action: none;
        }
        .viewer-wrapper canvas {
            display: block;
            width: 100%;
            height: auto;
            touch-action: none;
        }
        #drawLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }
        #pdfCanvas {
            width: 100%;
            height: auto;
            display: block;
            touch-action: none;
        }
        #wordContent {
            padding: 20px;
            background: white;
            min-height: 500px;
            font-size: 16px;
            line-height: 1.8;
            color: #1a1a2e;
            display: none;
            touch-action: none;
        }
        #wordContent p {
            margin-bottom: 12px;
        }
        #wordContent img {
            max-width: 100%;
            height: auto;
        }

        /* ----- REMOTE CURSOR ----- */
        .remote-cursor {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(108, 92, 231, 0.8);
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.5);
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: none;
        }

        /* ----- STATUS ----- */
        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #636e72;
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .status strong {
            color: #2d3436;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            h1 {
                font-size: 18px;
            }
            .toolbar {
                padding: 10px 12px;
                gap: 8px;
            }
            .toolbar button {
                padding: 5px 10px;
                font-size: 12px;
            }
            .page-nav {
                padding: 8px 12px;
            }
            .page-nav button {
                padding: 4px 10px;
                font-size: 12px;
            }
            .connection-panel {
                padding: 10px 12px;
            }
            .connection-panel .room-code {
                font-size: 16px;
                min-width: 60px;
            }
            .upload-area input[type="file"] {
                font-size: 13px;
                padding: 8px 10px;
            }
        }

        /* ----- Mobile-only controls (hiện trên điện thoại) ----- */
        .mobile-controls {
            display: none;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #e9ecef;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .mobile-controls button {
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .mobile-controls button.active {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }
        .mobile-controls .color-picker-mobile {
            width: 40px;
            height: 40px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 2px;
            cursor: pointer;
        }

        @media (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            🖊️ Vẽ Từ Xa
            <small>Điện thoại điều khiển máy tính</small>
        </h1>

        <!-- UPLOAD -->
        <div class="upload-area">
            <input type="file" id="fileInput" accept=".pdf,.docx,.doc" />
            <button id="loadBtn">📂 Tải lên</button>
            <span class="file-name" id="fileName">Chưa có file</span>
        </div>

        <!-- KẾT NỐI -->
        <div class="connection-panel" id="connectionPanel">
            <span style="font-weight:600;">📡 Kết nối:</span>
            <input type="text" id="roomInput" placeholder="Nhập mã phòng" value="" maxlength="6" />
            <button class="btn-connect" id="connectBtn">🔗 Kết nối</button>
            <button class="btn-disconnect" id="disconnectBtn" style="display:none;">🔌 Ngắt</button>
            <span class="status-badge disconnected" id="connectionStatus">Chưa kết nối</span>
            <span style="font-weight:600;margin-left:10px;">Mã phòng:</span>
            <span class="room-code" id="roomCode">------</span>
            <button class="btn-copy" id="copyRoomBtn">📋 Sao chép</button>
            <span class="hint">(Chia sẻ mã này với điện thoại)</span>
        </div>

        <!-- PAGE NAV -->
        <div class="page-nav" id="pageNav" style="display:none;">
            <button id="prevPage">◀ Trang trước</button>
            <span class="page-info" id="pageInfo">Trang 1 / 1</span>
            <button id="nextPage">Trang sau ▶</button>
            <div class="page-actions">
                <button id="addPageBtn">➕ Thêm trang</button>
                <button id="deletePageBtn">🗑️ Xóa trang</button>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar" id="toolbar">
            <div class="group">
                <button id="penBtn" class="active">✏️ Bút</button>
                <button id="highlightBtn">🟡 Highlight</button>
                <button id="eraserBtn">🧹 Tẩy</button>
            </div>
            <div class="group">
                <label>Màu</label>
                <input type="color" id="colorPicker" value="#e17055" />
            </div>
            <div class="group">
                <label>Kích thước</label>
                <input type="range" id="sizeSlider" min="1" max="30" value="4" />
                <span class="size-value" id="sizeDisplay">4</span>
            </div>
            <div class="group">
                <button id="undoBtn">↩️ Hoàn tác</button>
                <button id="clearBtn">🗑️ Xóa hết</button>
            </div>
            <div class="group" style="margin-left:auto;">
                <button class="save-btn" id="savePdfBtn">💾 Lưu PDF</button>
            </div>
        </div>

        <!-- VIEWER -->
        <div class="viewer-wrapper" id="viewerWrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="wordContent"></div>
            <canvas id="drawLayer"></canvas>
            <div class="remote-cursor" id="remoteCursor"></div>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls" id="mobileControls">
            <button id="mPenBtn" class="active">✏️</button>
            <button id="mHighlightBtn">🟡</button>
            <button id="mEraserBtn">🧹</button>
            <input type="color" id="mColorPicker" class="color-picker-mobile" value="#e17055" />
            <button id="mUndoBtn">↩️</button>
            <button id="mClearBtn">🗑️</button>
        </div>

        <div class="status" id="status">
            ⚡ Tải file PDF hoặc Word (.docx) để bắt đầu
        </div>
    </div>

    <script>
        // ============================================================
        // 1. CẤU HÌNH WEBSOCKET
        // ============================================================
        // Sử dụng WebSocket public broker (Mosquitto test server)
        // Trong thực tế, bạn nên chạy server WebSocket riêng
        const WS_BROKER = 'wss://test.mosquitto.org:8081/mqtt';

        // ============================================================
        // 2. KHỞI TẠO DOM
        // ============================================================
        const fileInput = document.getElementById('fileInput');
        const loadBtn = document.getElementById('loadBtn');
        const fileName = document.getElementById('fileName');
        const status = document.getElementById('status');

        const drawCanvas = document.getElementById('drawLayer');
        const ctx = drawCanvas.getContext('2d');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const pdfCtx = pdfCanvas.getContext('2d');
        const wordContent = document.getElementById('wordContent');
        const viewerWrapper = document.getElementById('viewerWrapper');

        // Nút toolbar
        const penBtn = document.getElementById('penBtn');
        const highlightBtn = document.getElementById('highlightBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const undoBtn = document.getElementById('undoBtn');
        const clearBtn = document.getElementById('clearBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');

        // Page nav
        const pageNav = document.getElementById('pageNav');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');
        const addPageBtn = document.getElementById('addPageBtn');
        const deletePageBtn = document.getElementById('deletePageBtn');

        // Connection
        const roomInput = document.getElementById('roomInput');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const roomCode = document.getElementById('roomCode');
        const copyRoomBtn = document.getElementById('copyRoomBtn');
        const remoteCursor = document.getElementById('remoteCursor');

        // Mobile
        const mPenBtn = document.getElementById('mPenBtn');
        const mHighlightBtn = document.getElementById('mHighlightBtn');
        const mEraserBtn = document.getElementById('mEraserBtn');
        const mColorPicker = document.getElementById('mColorPicker');
        const mUndoBtn = document.getElementById('mUndoBtn');
        const mClearBtn = document.getElementById('mClearBtn');

        // ============================================================
        // 3. BIẾN TRẠNG THÁI
        // ============================================================
        let currentMode = 'pen';
        let isDrawing = false;
        let lastX = 0,
            lastY = 0;
        let currentFileType = null;
        let pdfDoc = null;
        let pdfData = null;
        let currentPageNum = 1;
        let totalPages = 0;
        let scale = 1.5;
        let canvasWidth = 0;
        let canvasHeight = 0;

        let pageDrawings = {};
        let currentPath = [];
        const MAX_HISTORY = 50;

        // WebSocket
        let ws = null;
        let isConnected = false;
        let roomId = '';
        let isHost = true; // Máy tính là host, điện thoại là client

        // Remote drawing state
        let remoteDrawing = false;
        let remotePath = [];

        // ============================================================
        // 4. QUẢN LÝ LỊCH SỬ VẼ
        // ============================================================
        function getDrawingsForPage(pageNum) {
            if (!pageDrawings[pageNum]) pageDrawings[pageNum] = [];
            return pageDrawings[pageNum];
        }

        function savePathForPage(pageNum, points, color, size, mode) {
            if (points.length < 2) return;
            const paths = getDrawingsForPage(pageNum);
            paths.push({
                points: points.map(p => ({ x: p.x, y: p.y })),
                color: color,
                size: size,
                mode: mode
            });
            if (paths.length > MAX_HISTORY) paths.shift();
        }

        function redrawPage(pageNum) {
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            const paths = getDrawingsForPage(pageNum);
            for (const path of paths) {
                drawPath(ctx, path);
            }
        }

        function drawPath(context, path) {
            const { points, color, size, mode } = path;
            if (points.length < 2) return;
            context.save();
            context.lineCap = 'round';
            context.lineJoin = 'round';
            context.lineWidth = size;
            if (mode === 'eraser') {
                context.globalCompositeOperation = 'destination-out';
                context.strokeStyle = 'rgba(0,0,0,1)';
            } else if (mode === 'highlight') {
                context.globalCompositeOperation = 'source-over';
                context.strokeStyle = 'rgba(255, 235, 59, 0.35)';
                context.lineWidth = size * 3;
            } else {
                context.globalCompositeOperation = 'source-over';
                context.strokeStyle = color;
            }
            context.beginPath();
            context.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                context.lineTo(points[i].x, points[i].y);
            }
            context.stroke();
            context.restore();
        }

        function undoPage(pageNum) {
            const paths = getDrawingsForPage(pageNum);
            if (paths.length === 0) return false;
            paths.pop();
            redrawPage(pageNum);
            return true;
        }

        function clearPage(pageNum) {
            const paths = getDrawingsForPage(pageNum);
            if (paths.length === 0) return false;
            pageDrawings[pageNum] = [];
            redrawPage(pageNum);
            return true;
        }

        // ============================================================
        // 5. RESIZE CANVAS
        // ============================================================
        function resizeDrawLayer() {
            const rect = viewerWrapper.getBoundingClientRect();
            const w = rect.width;
            let h = w * 1.4;

            if (currentFileType === 'pdf' && pdfDoc) {
                pdfDoc.getPage(currentPageNum).then(page => {
                    const viewport = page.getViewport({ scale: scale });
                    h = w * (viewport.height / viewport.width);
                    setCanvasSize(w, h);
                });
            } else {
                setCanvasSize(w, h);
            }
        }

        function setCanvasSize(w, h) {
            drawCanvas.width = w;
            drawCanvas.height = h;
            drawCanvas.style.width = w + 'px';
            drawCanvas.style.height = h + 'px';
            canvasWidth = w;
            canvasHeight = h;
            const page = currentFileType === 'pdf' ? currentPageNum : 1;
            redrawPage(page);
        }

        // ============================================================
        // 6. VẼ LOCAL
        // ============================================================
        function getCoords(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
            const clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
            const x = (clientX - rect.left);
            const y = (clientY - rect.top);
            const scaleX = drawCanvas.width / rect.width;
            const scaleY = drawCanvas.height / rect.height;
            return { x: x * scaleX, y: y * scaleY };
        }

        function startDraw(e) {
            e.preventDefault();
            if (!currentFileType) {
                status.innerHTML = '⚠️ Vui lòng tải file trước khi vẽ!';
                return;
            }
            isDrawing = true;
            const coords = getCoords(e);
            lastX = coords.x;
            lastY = coords.y;
            currentPath = [];
            currentPath.push({ x: lastX, y: lastY });

            // Gửi sự kiện bắt đầu vẽ qua WebSocket
            sendDrawEvent('start', { x: lastX, y: lastY });

            ctx.save();
            ctx.beginPath();
            const size = currentMode === 'eraser' ? parseInt(sizeSlider.value) * 2 : parseInt(sizeSlider.value);
            ctx.arc(lastX, lastY, size / 2, 0, Math.PI * 2);
            if (currentMode === 'eraser') ctx.fillStyle = 'rgba(0,0,0,0.3)';
            else if (currentMode === 'highlight') ctx.fillStyle = 'rgba(255,235,59,0.35)';
            else ctx.fillStyle = colorPicker.value;
            ctx.fill();
            ctx.restore();
        }

        function moveDraw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const coords = getCoords(e);
            const x = coords.x;
            const y = coords.y;

            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            const size = currentMode === 'eraser' ? parseInt(sizeSlider.value) * 2 : parseInt(sizeSlider.value);
            ctx.lineWidth = size;

            if (currentMode === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else if (currentMode === 'highlight') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'rgba(255, 235, 59, 0.35)';
                ctx.lineWidth = size * 3;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = colorPicker.value;
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();

            currentPath.push({ x, y });
            lastX = x;
            lastY = y;

            // Gửi điểm vẽ qua WebSocket
            sendDrawEvent('move', { x: x, y: y });
        }

        function endDraw(e) {
            e.preventDefault();
            if (isDrawing && currentPath.length > 0) {
                const color = currentMode === 'eraser' ? '#000' : (currentMode === 'highlight' ? '#ffeb3b' : colorPicker
                .value);
                const size = currentMode === 'eraser' ? parseInt(sizeSlider.value) * 2 : parseInt(sizeSlider.value);
                const mode = currentMode;
                const page = currentFileType === 'pdf' ? currentPageNum : 1;
                savePathForPage(page, currentPath, color, size, mode);
                currentPath = [];

                // Gửi sự kiện kết thúc
                sendDrawEvent('end', {});
            }
            isDrawing = false;
        }

        // ============================================================
        // 7. WEBSOCKET - KẾT NỐI & GIAO TIẾP
        // ============================================================
        function generateRoomId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function connectWebSocket(room) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            roomId = room || generateRoomId();
            roomCode.textContent = roomId;
            roomInput.value = roomId;

            status.innerHTML = `⏳ Đang kết nối đến phòng ${roomId}...`;

            try {
                // Sử dụng WebSocket trực tiếp với broker MQTT (dùng cho demo)
                // Trong thực tế, bạn nên chạy server WebSocket riêng
                ws = new WebSocket(WS_BROKER);

                ws.onopen = function() {
                    isConnected = true;
                    updateConnectionUI(true);
                    status.innerHTML = `✅ Đã kết nối! Phòng: <strong>${roomId}</strong>`;

                    // Đăng ký topic
                    const subscribeMsg = `SUBSCRIBE\nroom/${roomId}\n0`;
                    ws.send(subscribeMsg);

                    // Gửi thông báo tham gia
                    const joinMsg = `PUBLISH\nroom/${roomId}\n${JSON.stringify({ type: 'join', role: 'host', room: roomId })}`;
                    ws.send(joinMsg);

                    // Gửi trạng thái hiện tại
                    syncState();
                };

                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        // Có thể là dữ liệu MQTT raw, bỏ qua
                        console.log('Raw data:', event.data);
                    }
                };

                ws.onerror = function(err) {
                    console.error('WebSocket error:', err);
                    status.innerHTML = '❌ Lỗi kết nối WebSocket';
                };

                ws.onclose = function() {
                    isConnected = false;
                    updateConnectionUI(false);
                    status.innerHTML = '🔌 Đã ngắt kết nối';
                };

            } catch (err) {
                status.innerHTML = '❌ Không thể kết nối: ' + err.message;
            }
        }

        function handleWebSocketMessage(data) {
            // Xử lý message từ remote
            if (data.type === 'draw') {
                handleRemoteDraw(data);
            } else if (data.type === 'sync') {
                handleRemoteSync(data);
            } else if (data.type === 'join') {
                status.innerHTML = `📱 Có thiết bị khác đã tham gia phòng ${roomId}`;
            } else if (data.type === 'mode_change') {
                // Đổi mode theo remote
                setMode(data.mode);
            } else if (data.type === 'color_change') {
                colorPicker.value = data.color;
                mColorPicker.value = data.color;
            } else if (data.type === 'size_change') {
                sizeSlider.value = data.size;
                sizeDisplay.textContent = data.size;
            } else if (data.type === 'undo') {
                const page = currentFileType === 'pdf' ? currentPageNum : 1;
                undoPage(page);
                status.innerHTML = '↩️ Remote đã hoàn tác';
            } else if (data.type === 'clear') {
                const page = currentFileType === 'pdf' ? currentPageNum : 1;
                clearPage(page);
                status.innerHTML = '🗑️ Remote đã xóa hết';
            }
        }

        function handleRemoteDraw(data) {
            const { action, x, y, color, size, mode } = data;

            if (action === 'start') {
                remoteDrawing = true;
                remotePath = [{ x, y }];
                // Hiển thị con trỏ remote
                showRemoteCursor(x, y);
                // Vẽ điểm bắt đầu
                ctx.save();
                ctx.beginPath();
                const sz = size || parseInt(sizeSlider.value);
                ctx.arc(x, y, sz / 2, 0, Math.PI * 2);
                ctx.fillStyle = color || colorPicker.value;
                ctx.fill();
                ctx.restore();
            } else if (action === 'move' && remoteDrawing) {
                remotePath.push({ x, y });
                showRemoteCursor(x, y);

                // Vẽ đường từ điểm cuối đến điểm mới
                const last = remotePath[remotePath.length - 2];
                if (last) {
                    ctx.save();
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    const sz = size || parseInt(sizeSlider.value);
                    ctx.lineWidth = sz;
                    ctx.strokeStyle = color || colorPicker.value;
                    ctx.beginPath();
                    ctx.moveTo(last.x, last.y);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    ctx.restore();
                }
            } else if (action === 'end' && remoteDrawing) {
                // Lưu path remote vào lịch sử
                if (remotePath.length >= 2) {
                    const page = currentFileType === 'pdf' ? currentPageNum : 1;
                    const clr = color || colorPicker.value;
                    const sz = size || parseInt(sizeSlider.value);
                    const md = mode || currentMode;
                    savePathForPage(page, remotePath, clr, sz, md);
                }
                remoteDrawing = false;
                remotePath = [];
                hideRemoteCursor();
            }
        }

        function handleRemoteSync(data) {
            // Đồng bộ trạng thái từ remote
            if (data.pageDrawings) {
                pageDrawings = data.pageDrawings;
                const page = currentFileType === 'pdf' ? currentPageNum : 1;
                redrawPage(page);
            }
        }

        function sendDrawEvent(action, coords) {
            if (!isConnected || !ws) return;
            const msg = {
                type: 'draw',
                action: action,
                x: coords.x || 0,
                y: coords.y || 0,
                color: colorPicker.value,
                size: parseInt(sizeSlider.value),
                mode: currentMode,
                room: roomId
            };
            sendWsMessage(msg);
        }

        function sendWsMessage(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = `PUBLISH\nroom/${roomId}\n${JSON.stringify(msg)}`;
                ws.send(payload);
            }
        }

        function syncState() {
            // Gửi trạng thái hiện tại
            const msg = {
                type: 'sync',
                pageDrawings: pageDrawings,
                currentPage: currentPageNum,
                fileType: currentFileType,
                room: roomId
            };
            sendWsMessage(msg);
        }

        function showRemoteCursor(x, y) {
            const rect = drawCanvas.getBoundingClientRect();
            const scaleX = drawCanvas.width / rect.width;
            const scaleY = drawCanvas.height / rect.height;
            remoteCursor.style.display = 'block';
            remoteCursor.style.left = (x / scaleX + rect.left) + 'px';
            remoteCursor.style.top = (y / scaleY + rect.top) + 'px';
        }

        function hideRemoteCursor() {
            remoteCursor.style.display = 'none';
        }

        function updateConnectionUI(connected) {
            if (connected) {
                connectionStatus.textContent = '✅ Đã kết nối';
                connectionStatus.className = 'status-badge connected';
                connectBtn.style.display = 'none';
                disconnectBtn.style.display = 'inline-block';
                roomInput.disabled = true;
            } else {
                connectionStatus.textContent = '🔴 Chưa kết nối';
                connectionStatus.className = 'status-badge disconnected';
                connectBtn.style.display = 'inline-block';
                disconnectBtn.style.display = 'none';
                roomInput.disabled = false;
            }
        }

        // ============================================================
        // 8. SỰ KIỆN KẾT NỐI
        // ============================================================
        connectBtn.addEventListener('click', () => {
            const room = roomInput.value.trim() || generateRoomId();
            connectWebSocket(room);
        });

        disconnectBtn.addEventListener('click', () => {
            if (ws) {
                ws.close();
                ws = null;
            }
            isConnected = false;
            updateConnectionUI(false);
            status.innerHTML = '🔌 Đã ngắt kết nối';
        });

        copyRoomBtn.addEventListener('click', () => {
            const text = roomCode.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    status.innerHTML = '📋 Đã sao chép mã phòng: ' + text;
                });
            } else {
                // Fallback
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                status.innerHTML = '📋 Đã sao chép mã phòng: ' + text;
            }
        });

        // Tự động tạo mã phòng khi tải trang
        window.addEventListener('DOMContentLoaded', () => {
            const newRoom = generateRoomId();
            roomCode.textContent = newRoom;
            roomInput.value = newRoom;
        });

        // ============================================================
        // 9. TOOLBAR EVENTS
        // ============================================================
        function setMode(mode) {
            currentMode = mode;
            [penBtn, highlightBtn, eraserBtn].forEach(btn => btn.classList.remove('active'));
            [mPenBtn, mHighlightBtn, mEraserBtn].forEach(btn => btn.classList.remove('active'));

            if (mode === 'pen') {
                penBtn.classList.add('active');
                mPenBtn.classList.add('active');
            } else if (mode === 'highlight') {
                highlightBtn.classList.add('active');
                mHighlightBtn.classList.add('active');
            } else if (mode === 'eraser') {
                eraserBtn.classList.add('active');
                mEraserBtn.classList.add('active');
            }
            drawCanvas.style.cursor = mode === 'eraser' ? 'cell' : 'crosshair';

            // Gửi thay đổi mode qua WebSocket
            if (isConnected) {
                sendWsMessage({ type: 'mode_change', mode: mode, room: roomId });
            }
        }

        penBtn.addEventListener('click', () => setMode('pen'));
        highlightBtn.addEventListener('click', () => setMode('highlight'));
        eraserBtn.addEventListener('click', () => setMode('eraser'));

        mPenBtn.addEventListener('click', () => setMode('pen'));
        mHighlightBtn.addEventListener('click', () => setMode('highlight'));
        mEraserBtn.addEventListener('click', () => setMode('eraser'));

        colorPicker.addEventListener('input', () => {
            mColorPicker.value = colorPicker.value;
            if (isConnected) {
                sendWsMessage({ type: 'color_change', color: colorPicker.value, room: roomId });
            }
        });

        mColorPicker.addEventListener('input', () => {
            colorPicker.value = mColorPicker.value;
            if (isConnected) {
                sendWsMessage({ type: 'color_change', color: mColorPicker.value, room: roomId });
            }
        });

        sizeSlider.addEventListener('input', () => {
            sizeDisplay.textContent = sizeSlider.value;
            if (isConnected) {
                sendWsMessage({ type: 'size_change', size: parseInt(sizeSlider.value), room: roomId });
            }
        });

        undoBtn.addEventListener('click', () => {
            const page = currentFileType === 'pdf' ? currentPageNum : 1;
            if (undoPage(page)) {
                status.innerHTML = '↩️ Đã hoàn tác 1 bước';
                if (isConnected) {
                    sendWsMessage({ type: 'undo', room: roomId });
                }
            } else {
                status.innerHTML = 'ℹ️ Không còn gì để hoàn tác';
            }
        });

        mUndoBtn.addEventListener('click', () => {
            undoBtn.click();
        });

        clearBtn.addEventListener('click', () => {
            const page = currentFileType === 'pdf' ? currentPageNum : 1;
            if (clearPage(page)) {
                status.innerHTML = '🗑️ Đã xóa toàn bộ nét vẽ';
                if (isConnected) {
                    sendWsMessage({ type: 'clear', room: roomId });
                }
            } else {
                status.innerHTML = 'ℹ️ Trang này chưa có nét vẽ nào';
            }
        });

        mClearBtn.addEventListener('click', () => {
            clearBtn.click();
        });

        // ============================================================
        // 10. SỰ KIỆN VẼ LOCAL
        // ============================================================
        drawCanvas.addEventListener('mousedown', startDraw);
        drawCanvas.addEventListener('mousemove', moveDraw);
        drawCanvas.addEventListener('mouseup', endDraw);
        drawCanvas.addEventListener('mouseleave', endDraw);
        drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
        drawCanvas.addEventListener('touchmove', moveDraw, { passive: false });
        drawCanvas.addEventListener('touchend', endDraw, { passive: false });
        drawCanvas.addEventListener('touchcancel', endDraw, { passive: false });

        // ============================================================
        // 11. TẢI PDF
        // ============================================================
        async function loadPDF(file) {
            pdfData = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
            totalPages = pdfDoc.numPages;
            currentPageNum = 1;
            currentFileType = 'pdf';

            wordContent.style.display = 'none';
            pdfCanvas.style.display = 'block';
            drawCanvas.style.display = 'block';
            pageNav.style.display = 'flex';

            pageDrawings = {};
            await renderPDFPage(currentPageNum);
            status.innerHTML = `📄 Đã tải PDF: <strong>${file.name}</strong> | ${totalPages} trang`;

            // Đồng bộ sau khi load
            if (isConnected) syncState();
        }

        async function renderPDFPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const containerWidth = viewerWrapper.clientWidth || 800;
            scale = containerWidth / page.getViewport({ scale: 1 }).width;
            const viewport = page.getViewport({ scale: scale });

            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            pdfCanvas.style.width = viewport.width + 'px';
            pdfCanvas.style.height = viewport.height + 'px';

            const renderContext = {
                canvasContext: pdfCtx,
                viewport: viewport
            };
            await page.render(renderContext).promise;

            drawCanvas.width = viewport.width;
            drawCanvas.height = viewport.height;
            drawCanvas.style.width = viewport.width + 'px';
            drawCanvas.style.height = viewport.height + 'px';
            canvasWidth = viewport.width;
            canvasHeight = viewport.height;

            redrawPage(pageNum);
            pageInfo.textContent = `Trang ${pageNum} / ${totalPages}`;
            prevPageBtn.disabled = pageNum <= 1;
            nextPageBtn.disabled = pageNum >= totalPages;
        }

        // ============================================================
        // 12. ĐIỀU HƯỚNG TRANG
        // ============================================================
        prevPageBtn.addEventListener('click', async () => {
            if (currentPageNum > 1) {
                currentPageNum--;
                await renderPDFPage(currentPageNum);
                if (isConnected) syncState();
            }
        });

        nextPageBtn.addEventListener('click', async () => {
            if (currentPageNum < totalPages) {
                currentPageNum++;
                await renderPDFPage(currentPageNum);
                if (isConnected) syncState();
            }
        });

        // ============================================================
        // 13. THÊM / XÓA TRANG
        // ============================================================
        addPageBtn.addEventListener('click', async () => {
            if (!pdfDoc) return;
            try {
                const pdfLibDoc = await PDFLib.PDFDocument.load(pdfData);
                pdfLibDoc.addPage();
                const newPdfBytes = await pdfLibDoc.save();
                pdfData = newPdfBytes;
                pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                totalPages = pdfDoc.numPages;
                currentPageNum = totalPages;
                await renderPDFPage(currentPageNum);
                status.innerHTML = '✅ Đã thêm trang mới';
                if (isConnected) syncState();
            } catch (err) {
                status.innerHTML = '❌ Lỗi thêm trang: ' + err.message;
            }
        });

        deletePageBtn.addEventListener('click', async () => {
            if (!pdfDoc || totalPages <= 1) {
                status.innerHTML = '⚠️ Không thể xóa trang cuối cùng';
                return;
            }
            if (!confirm(`Xóa trang ${currentPageNum}?`)) return;
            try {
                const pdfLibDoc = await PDFLib.PDFDocument.load(pdfData);
                pdfLibDoc.removePage(currentPageNum - 1);
                const newPdfBytes = await pdfLibDoc.save();
                pdfData = newPdfBytes;
                pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                totalPages = pdfDoc.numPages;
                if (currentPageNum > totalPages) currentPageNum = totalPages;
                delete pageDrawings[currentPageNum];
                await renderPDFPage(currentPageNum);
                status.innerHTML = '✅ Đã xóa trang';
                if (isConnected) syncState();
            } catch (err) {
                status.innerHTML = '❌ Lỗi xóa trang: ' + err.message;
            }
        });

        // ============================================================
        // 14. TẢI WORD
        // ============================================================
        async function loadWord(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
            currentFileType = 'word';
            pdfCanvas.style.display = 'none';
            wordContent.style.display = 'block';
            drawCanvas.style.display = 'block';
            pageNav.style.display = 'none';
            wordContent.innerHTML = result.value;
            pageDrawings = {};
            setTimeout(() => {
                const rect = viewerWrapper.getBoundingClientRect();
                setCanvasSize(rect.width, rect.width * 1.4);
                redrawPage(1);
            }, 100);
            status.innerHTML = `📄 Đã tải Word: <strong>${file.name}</strong>`;
            if (isConnected) syncState();
        }

        // ============================================================
        // 15. XỬ LÝ UPLOAD
        // ============================================================
        function handleFile(file) {
            if (!file) return;
            fileName.textContent = file.name;
            fileName.classList.add('show');
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                loadPDF(file);
            } else if (ext === 'docx' || ext === 'doc') {
                loadWord(file);
            } else {
                status.innerHTML = '❌ Chỉ hỗ trợ PDF hoặc Word (.docx)';
            }
        }

        loadBtn.addEventListener('click', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            } else {
                status.innerHTML = '⚠️ Vui lòng chọn file';
            }
        });

        // ============================================================
        // 16. LƯU PDF
        // ============================================================
        savePdfBtn.addEventListener('click', async () => {
            if (currentFileType !== 'pdf') {
                status.innerHTML = '⚠️ Chỉ hỗ trợ lưu file PDF';
                return;
            }
            try {
                status.innerHTML = '⏳ Đang xử lý lưu file...';
                const pdfLibDoc = await PDFLib.PDFDocument.load(pdfData);
                const pages = pdfLibDoc.getPages();

                for (const pageNumStr in pageDrawings) {
                    const pageNum = parseInt(pageNumStr);
                    const paths = pageDrawings[pageNum];
                    if (!paths || paths.length === 0) continue;
                    const pageIndex = pageNum - 1;
                    if (pageIndex >= pages.length) continue;
                    const pdfPage = pages[pageIndex];
                    const { width, height } = pdfPage.getSize();

                    for (const path of paths) {
                        const points = path.points;
                        if (points.length < 2) continue;
                        const rgb = hexToRgb(path.color);

                        if (path.mode === 'highlight') {
                            // Highlight: vẽ các đoạn thẳng với màu vàng mờ
                            for (let i = 0; i < points.length - 1; i++) {
                                const p1 = points[i];
                                const p2 = points[i + 1];
                                pdfPage.drawLine({
                                    start: { x: p1.x / canvasWidth * width, y: (1 - p1.y / canvasHeight) * height },
                                    end: { x: p2.x / canvasWidth * width, y: (1 - p2.y / canvasHeight) * height },
                                    thickness: path.size * 3 * (width / canvasWidth),
                                    color: PDFLib.rgb(1, 0.92, 0.23),
                                    opacity: 0.35,
                                });
                            }
                            continue;
                        }

                        if (path.mode === 'eraser') {
                            // Tẩy: vẽ màu trắng
                            for (let i = 0; i < points.length - 1; i++) {
                                const p1 = points[i];
                                const p2 = points[i + 1];
                                pdfPage.drawLine({
                                    start: { x: p1.x / canvasWidth * width, y: (1 - p1.y / canvasHeight) * height },
                                    end: { x: p2.x / canvasWidth * width, y: (1 - p2.y / canvasHeight) * height },
                                    thickness: path.size * 2 * (width / canvasWidth),
                                    color: PDFLib.rgb(1, 1, 1),
                                    opacity: 1,
                                });
                            }
                            continue;
                        }

                        // Bút thường
                        for (let i = 0; i < points.length - 1; i++) {
                            const p1 = points[i];
                            const p2 = points[i + 1];
                            pdfPage.drawLine({
                                start: { x: p1.x / canvasWidth * width, y: (1 - p1.y / canvasHeight) * height },
                                end: { x: p2.x / canvasWidth * width, y: (1 - p2.y / canvasHeight) * height },
                                thickness: path.size * (width / canvasWidth),
                                color: PDFLib.rgb(rgb.r, rgb.g, rgb.b),
                                opacity: 1,
                            });
                        }
                    }
                }

                const pdfBytes = await pdfLibDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'file_da_ve.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                status.innerHTML = '✅ Đã lưu file PDF thành công!';
            } catch (err) {
                status.innerHTML = '❌ Lỗi lưu file: ' + err.message;
                console.error(err);
            }
        });

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16) / 255,
                g: parseInt(result[2], 16) / 255,
                b: parseInt(result[3], 16) / 255
            } : { r: 1, g: 0, b: 0 };
        }

        // ============================================================
        // 17. KHỞI TẠO
        // ============================================================
        setMode('pen');

        window.addEventListener('resize', () => {
            if (currentFileType === 'pdf') {
                renderPDFPage(currentPageNum);
            } else if (currentFileType === 'word') {
                const rect = viewerWrapper.getBoundingClientRect();
                setCanvasSize(rect.width, rect.width * 1.4);
                redrawPage(1);
            } else {
                const rect = viewerWrapper.getBoundingClientRect();
                setCanvasSize(rect.width, rect.width * 1.4);
            }
        });

        setTimeout(() => {
            const rect = viewerWrapper.getBoundingClientRect();
            setCanvasSize(rect.width, rect.width * 1.4);
        }, 300);

        console.log('🚀 Trang web Vẽ Từ Xa đã sẵn sàng!');
        console.log('📌 Hướng dẫn:');
        console.log('1. Máy tính: Tải file PDF/Word lên');
        console.log('2. Bấm "Kết nối" để tạo phòng');
        console.log('3. Điện thoại: Truy cập cùng trang web, nhập mã phòng và bấm Kết nối');
        console.log('4. Vẽ trên điện thoại sẽ hiển thị trên máy tính!');
    </script>
